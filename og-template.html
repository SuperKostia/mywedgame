<!DOCTYPE html>
<html>
<head>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 200px; height: 200px; overflow: hidden;
    background: #FAF7F2;
    display: flex; align-items: center; justify-content: center;
    position: relative;

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;

  .grid svg { width: 70px; height: 70px; }
</style>
</head>
