<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Apfel'; src: url('fonts/ApfelGrotezk-Fett.woff2') format('woff2'); font-weight: 700; }
  @font-face { font-family: 'Terminal'; src: url('fonts/terminal-grotesque-webfont.woff2') format('woff2'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 1200px; overflow: hidden;
    background: #FAF7F2;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    font-family: 'Apfel', sans-serif;
  }
  .side-bar {
    position: absolute; top: 0; left: 0; bottom: 0; width: 14px;
    background: linear-gradient(180deg, #D4736C, #C9A96E);
  }
  .content { text-align: center; z-index: 2; position: relative; }
  .logo-line {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    font-size: 88px; font-weight: 700; letter-spacing: -0.03em; color: #2A2724;
  }
  .logo-wed { font-family: 'Terminal', sans-serif; font-weight: 400; color: #D4736C; text-transform: uppercase; font-size: 110px; letter-spacing: 0.01em; }
  .heart svg { width: 88px; height: 75px; }
  .tagline {
    font-family: 'Terminal', sans-serif;
    font-size: 48px;
    color: #2A2724;
    text-transform: uppercase;
    margin-top: 40px;
    letter-spacing: 0.02em;
  }
  .tagline em { color: #D4736C; font-style: normal; }
  .price {
    font-family: 'Apfel', sans-serif;
    font-size: 28px;
    color: #5C5653;
    margin-top: 24px;
  }
  .price strong { color: #D4736C; }
  .collectibles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    margin-top: 64px;
    justify-items: center;
  }
  .coll-item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .coll-item svg { width: 96px; height: 82px; }
  .coll-item span { font-size: 20px; color: #5C5653; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="side-bar"></div>
  <div class="content">
    <div class="logo-line">
      <span class="heart"><svg viewBox="0 0 7 6" shape-rendering="crispEdges" fill="#D4736C"><rect x="1" y="0" width="2" height="1"/><rect x="4" y="0" width="2" height="1"/><rect x="0" y="1" width="7" height="2"/><rect x="1" y="3" width="5" height="1"/><rect x="2" y="4" width="3" height="1"/><rect x="3" y="5" width="1" height="1"/></svg></span>
      <span>My<span class="logo-wed">Wed</span>Game</span>
    </div>
    <div class="tagline">Un jeu vidéo sur mesure<br>pour <em>votre mariage</em></div>
    <div class="price">À partir de <strong>699 € TTC</strong></div>
    <div class="collectibles">
      <div class="coll-item">
        <svg viewBox="0 0 7 6" shape-rendering="crispEdges"><rect fill="#E05A5A" x="1" y="0" width="2" height="1"/><rect fill="#E05A5A" x="4" y="0" width="2" height="1"/><rect fill="#F2A5A0" x="1" y="0" width="1" height="1"/><rect fill="#D4736C" x="0" y="1" width="7" height="1"/><rect fill="#E05A5A" x="1" y="1" width="1" height="1"/><rect fill="#D4736C" x="0" y="2" width="7" height="1"/><rect fill="#C4584A" x="1" y="3" width="5" height="1"/><rect fill="#B04030" x="2" y="4" width="3" height="1"/><rect fill="#8C3228" x="3" y="5" width="1" height="1"/></svg>
        <span>Cœur</span>
      </div>
      <div class="coll-item">
        <svg viewBox="0 0 7 7" shape-rendering="crispEdges"><rect fill="#C9A96E" x="2" y="0" width="3" height="1"/><rect fill="#E0F0FF" x="3" y="0" width="1" height="1"/><rect fill="#C9A96E" x="1" y="1" width="1" height="1"/><rect fill="#E8D5AD" x="2" y="1" width="3" height="1"/><rect fill="#C9A96E" x="5" y="1" width="1" height="1"/><rect fill="#C9A96E" x="0" y="2" width="1" height="3"/><rect fill="#C9A96E" x="6" y="2" width="1" height="3"/><rect fill="#E8D5AD" x="1" y="2" width="1" height="1"/><rect fill="#C9A96E" x="1" y="5" width="1" height="1"/><rect fill="#C9A96E" x="5" y="5" width="1" height="1"/><rect fill="#C9A96E" x="2" y="6" width="3" height="1"/></svg>
        <span>Alliance</span>
      </div>
      <div class="coll-item">
        <svg viewBox="0 0 7 7" shape-rendering="crispEdges"><rect fill="#F5D76E" x="3" y="0" width="1" height="1"/><rect fill="#E8C84A" x="2" y="1" width="1" height="1"/><rect fill="#FFE88A" x="3" y="1" width="1" height="1"/><rect fill="#E8C84A" x="4" y="1" width="1" height="1"/><rect fill="#C9A96E" x="0" y="2" width="2" height="1"/><rect fill="#F5D76E" x="2" y="2" width="1" height="1"/><rect fill="#FFE88A" x="3" y="2" width="1" height="1"/><rect fill="#F5D76E" x="4" y="2" width="1" height="1"/><rect fill="#C9A96E" x="5" y="2" width="2" height="1"/><rect fill="#E8C84A" x="1" y="3" width="1" height="1"/><rect fill="#FFE88A" x="2" y="3" width="3" height="1"/><rect fill="#E8C84A" x="5" y="3" width="1" height="1"/><rect fill="#F5D76E" x="2" y="4" width="3" height="1"/><rect fill="#E8C84A" x="1" y="5" width="1" height="1"/><rect fill="#F5D76E" x="2" y="5" width="1" height="1"/><rect fill="#F5D76E" x="4" y="5" width="1" height="1"/><rect fill="#E8C84A" x="5" y="5" width="1" height="1"/><rect fill="#C9A96E" x="0" y="6" width="1" height="1"/><rect fill="#C9A96E" x="6" y="6" width="1" height="1"/></svg>
        <span>Étoile</span>
      </div>
      <div class="coll-item">
        <svg viewBox="0 0 7 6" shape-rendering="crispEdges"><rect fill="#A8D8EA" x="2" y="0" width="3" height="1"/><rect fill="#88C8E8" x="1" y="1" width="1" height="1"/><rect fill="#E0F0FF" x="3" y="1" width="1" height="1"/><rect fill="#88C8E8" x="2" y="1" width="1" height="1"/><rect fill="#88C8E8" x="4" y="1" width="1" height="1"/><rect fill="#88C8E8" x="5" y="1" width="1" height="1"/><rect fill="#62B0D0" x="0" y="2" width="7" height="1"/><rect fill="#A8D8EA" x="2" y="2" width="1" height="1"/><rect fill="#E0F0FF" x="3" y="2" width="1" height="1"/><rect fill="#A8D8EA" x="4" y="2" width="1" height="1"/><rect fill="#88C8E8" x="1" y="3" width="5" height="1"/><rect fill="#A8D8EA" x="3" y="3" width="1" height="1"/><rect fill="#62B0D0" x="2" y="4" width="3" height="1"/><rect fill="#88C8E8" x="3" y="4" width="1" height="1"/><rect fill="#62B0D0" x="3" y="5" width="1" height="1"/></svg>
        <span>Diamant</span>
      </div>
    </div>
  </div>
</body>
</html>
