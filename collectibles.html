<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyWedGame — Collectibles Pixel Art</title>
  <style>
    body { background: #1C1917; color: #FAF7F2; font-family: system-ui, sans-serif; display: flex; flex-wrap: wrap; justify-content: center; gap: 3rem; padding: 3rem; }
    .item { text-align: center; }
    .item svg { image-rendering: pixelated; }
    .item p { margin-top: 0.75rem; font-size: 0.9rem; color: #C9A96E; }
  </style>
</head>
<body>

<!-- 1. COEUR -->
<div class="item">
  <svg width="112" height="96" viewBox="0 0 7 6" shape-rendering="crispEdges">
    <rect fill="#E05A5A" x="1" y="0" width="2" height="1"/>
    <rect fill="#E05A5A" x="4" y="0" width="2" height="1"/>
    <rect fill="#D4736C" x="0" y="1" width="7" height="1"/>
    <rect fill="#E05A5A" x="1" y="1" width="1" height="1"/>
    <rect fill="#F2A5A0" x="1" y="0" width="1" height="1"/>
    <rect fill="#D4736C" x="0" y="2" width="7" height="1"/>
    <rect fill="#C4584A" x="1" y="3" width="5" height="1"/>
    <rect fill="#B04030" x="2" y="4" width="3" height="1"/>
    <rect fill="#8C3228" x="3" y="5" width="1" height="1"/>
  </svg>
  <p>Cœur</p>
</div>

<!-- 2. ALLIANCE -->
<div class="item">
  <svg width="112" height="112" viewBox="0 0 7 7" shape-rendering="crispEdges">
    <rect fill="#C9A96E" x="2" y="0" width="3" height="1"/>
    <rect fill="#C9A96E" x="1" y="1" width="1" height="1"/>
    <rect fill="#E8D5AD" x="2" y="1" width="3" height="1"/>
    <rect fill="#C9A96E" x="5" y="1" width="1" height="1"/>
    <rect fill="#C9A96E" x="0" y="2" width="1" height="3"/>
    <rect fill="#C9A96E" x="6" y="2" width="1" height="3"/>
    <rect fill="#E8D5AD" x="1" y="2" width="1" height="1"/>
    <rect fill="#C9A96E" x="1" y="5" width="1" height="1"/>
    <rect fill="#C9A96E" x="5" y="5" width="1" height="1"/>
    <rect fill="#C9A96E" x="2" y="6" width="3" height="1"/>
    <!-- diamant sur l'alliance -->
    <rect fill="#FFFFFF" x="3" y="0" width="1" height="1"/>
    <rect fill="#E0F0FF" x="2" y="0" width="1" height="1"/>
    <rect fill="#E0F0FF" x="4" y="0" width="1" height="1"/>
  </svg>
  <p>Alliance</p>
</div>

<!-- 3. BOUQUET DE FLEURS -->
<div class="item">
  <svg width="112" height="128" viewBox="0 0 7 8" shape-rendering="crispEdges">
    <!-- fleurs -->
    <rect fill="#E88BA0" x="3" y="0" width="1" height="1"/>
    <rect fill="#F2A5B5" x="2" y="1" width="1" height="1"/>
    <rect fill="#E05A70" x="3" y="1" width="1" height="1"/>
    <rect fill="#F2A5B5" x="4" y="1" width="1" height="1"/>
    <rect fill="#E88BA0" x="1" y="2" width="1" height="1"/>
    <rect fill="#F2D5DD" x="2" y="2" width="1" height="1"/>
    <rect fill="#FFE0E8" x="3" y="2" width="1" height="1"/>
    <rect fill="#F2D5DD" x="4" y="2" width="1" height="1"/>
    <rect fill="#E88BA0" x="5" y="2" width="1" height="1"/>
    <rect fill="#F2A5B5" x="0" y="3" width="1" height="1"/>
    <rect fill="#E05A70" x="1" y="3" width="1" height="1"/>
    <rect fill="#FFE0E8" x="2" y="3" width="1" height="1"/>
    <rect fill="#E05A70" x="3" y="3" width="1" height="1"/>
    <rect fill="#FFE0E8" x="4" y="3" width="1" height="1"/>
    <rect fill="#E05A70" x="5" y="3" width="1" height="1"/>
    <rect fill="#F2A5B5" x="6" y="3" width="1" height="1"/>
    <rect fill="#7BAE8E" x="1" y="4" width="2" height="1"/>
    <rect fill="#5C8C6E" x="3" y="4" width="1" height="1"/>
    <rect fill="#7BAE8E" x="4" y="4" width="2" height="1"/>
    <!-- tiges -->
    <rect fill="#5C8C6E" x="3" y="5" width="1" height="1"/>
    <rect fill="#7BAE8E" x="2" y="5" width="1" height="1"/>
    <rect fill="#7BAE8E" x="4" y="5" width="1" height="1"/>
    <rect fill="#5C8C6E" x="3" y="6" width="1" height="1"/>
    <!-- ruban -->
    <rect fill="#C9A96E" x="2" y="7" width="3" height="1"/>
  </svg>
  <p>Bouquet</p>
</div>

<!-- 4. ETOILE -->
<div class="item">
  <svg width="112" height="112" viewBox="0 0 7 7" shape-rendering="crispEdges">
    <rect fill="#F5D76E" x="3" y="0" width="1" height="1"/>
    <rect fill="#E8C84A" x="2" y="1" width="1" height="1"/>
    <rect fill="#FFE88A" x="3" y="1" width="1" height="1"/>
    <rect fill="#E8C84A" x="4" y="1" width="1" height="1"/>
    <rect fill="#C9A96E" x="0" y="2" width="7" height="1"/>
    <rect fill="#F5D76E" x="2" y="2" width="3" height="1"/>
    <rect fill="#FFE88A" x="3" y="2" width="1" height="1"/>
    <rect fill="#E8C84A" x="1" y="3" width="5" height="1"/>
    <rect fill="#FFE88A" x="2" y="3" width="3" height="1"/>
    <rect fill="#F5D76E" x="2" y="4" width="3" height="1"/>
    <rect fill="#E8C84A" x="1" y="5" width="1" height="1"/>
    <rect fill="#F5D76E" x="2" y="5" width="1" height="1"/>
    <rect fill="#F5D76E" x="4" y="5" width="1" height="1"/>
    <rect fill="#E8C84A" x="5" y="5" width="1" height="1"/>
    <rect fill="#C9A96E" x="0" y="6" width="1" height="1"/>
    <rect fill="#C9A96E" x="6" y="6" width="1" height="1"/>
  </svg>
  <p>Étoile</p>
</div>

<!-- 5. DIAMANT -->
<div class="item">
  <svg width="112" height="112" viewBox="0 0 7 7" shape-rendering="crispEdges">
    <!-- top -->
    <rect fill="#A8D8EA" x="2" y="0" width="3" height="1"/>
    <rect fill="#88C8E8" x="1" y="1" width="5" height="1"/>
    <rect fill="#E0F0FF" x="3" y="1" width="1" height="1"/>
    <!-- middle band -->
    <rect fill="#62B0D0" x="0" y="2" width="7" height="1"/>
    <rect fill="#A8D8EA" x="2" y="2" width="1" height="1"/>
    <rect fill="#E0F0FF" x="3" y="2" width="1" height="1"/>
    <rect fill="#A8D8EA" x="4" y="2" width="1" height="1"/>
    <!-- bottom facets -->
    <rect fill="#88C8E8" x="1" y="3" width="5" height="1"/>
    <rect fill="#A8D8EA" x="3" y="3" width="1" height="1"/>
    <rect fill="#62B0D0" x="2" y="4" width="3" height="1"/>
    <rect fill="#88C8E8" x="3" y="4" width="1" height="1"/>
    <rect fill="#62B0D0" x="3" y="5" width="1" height="1"/>
  </svg>
  <p>Diamant</p>
</div>

<!-- 6. LETTRE D'AMOUR -->
<div class="item">
  <svg width="112" height="96" viewBox="0 0 7 6" shape-rendering="crispEdges">
    <!-- enveloppe -->
    <rect fill="#F0EBE3" x="0" y="0" width="7" height="6"/>
    <rect fill="#E0D8CC" x="0" y="0" width="7" height="1"/>
    <!-- rabat -->
    <rect fill="#D4C8B8" x="0" y="0" width="1" height="1"/>
    <rect fill="#D4C8B8" x="6" y="0" width="1" height="1"/>
    <rect fill="#D4C8B8" x="1" y="1" width="1" height="1"/>
    <rect fill="#D4C8B8" x="5" y="1" width="1" height="1"/>
    <rect fill="#D4C8B8" x="2" y="2" width="1" height="1"/>
    <rect fill="#D4C8B8" x="4" y="2" width="1" height="1"/>
    <!-- cœur sceau -->
    <rect fill="#D4736C" x="3" y="2" width="1" height="1"/>
    <rect fill="#E05A5A" x="2" y="3" width="1" height="1"/>
    <rect fill="#D4736C" x="3" y="3" width="1" height="1"/>
    <rect fill="#E05A5A" x="4" y="3" width="1" height="1"/>
    <rect fill="#D4736C" x="3" y="4" width="1" height="1"/>
    <!-- bord bas -->
    <rect fill="#D4C8B8" x="0" y="5" width="7" height="1"/>
  </svg>
  <p>Lettre d'amour</p>
</div>

</body>
</html>
